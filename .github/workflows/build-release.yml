# Build and Deploy Workflow: Builds the app and deploys artifacts when a tag is pushed
# This workflow performs the following tasks:
# 1. Verifies that the tag version matches the version in package.json
# 2. Builds the app on macOS and Windows
# 3. Attaches built artifacts to the GitHub release
# 4. Creates a release in the opspresso/toast repository
# 5. Triggers an update to the Homebrew tap
# This workflow is triggered by tags created in the push.yml workflow

name: Build and Release

on:
  push:
    tags:
      - 'v*' # Any tag starting with 'v'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: 'v0.0.0' # Default version for manual dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest] # , ubuntu-latest
      fail-fast: false
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - name: Checkout code 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch complete history

      - name: Setup Node.js 🐍
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm' # Use npm cache

      - name: Install dependencies 📦
        run: npm ci # Install dependencies

      - name: Sync version from tag 🏷️
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.version }}"
          else
            TAG_VERSION="${{ github.ref_name }}"
          fi
          VERSION="${TAG_VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "✅ package.json version updated to $VERSION"

      - name: Configure environment variables 🔑
        shell: bash
        run: |
          # Set environment variables needed for app execution
          echo "CLIENT_ID=${{ secrets.TOAST_CLIENT_ID }}" >> src/main/config/.env
          echo "CLIENT_SECRET=${{ secrets.TOAST_CLIENT_SECRET }}" >> src/main/config/.env
          echo "NODE_ENV=${{ vars.NODE_ENV }}" >> src/main/config/.env
          echo "TOAST_URL=${{ vars.TOAST_URL }}" >> src/main/config/.env
          echo "TOKEN_EXPIRES_IN=${{ vars.TOKEN_EXPIRES_IN }}" >> src/main/config/.env

      - name: Import macOS codesign certificate 🔐
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Prepare for app notarization 🔑
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Write App Store Connect API key to disk
          mkdir -p "$HOME/private_keys/"
          echo '${{ secrets.API_KEY_SECRET }}' > "$HOME/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8"

          # Export electron-builder notarization env vars for subsequent steps
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.API_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${{ secrets.API_KEY_ISSUER_ID }}" >> "$GITHUB_ENV"

      - name: Build Electron app on macOS 📦
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GHP_TOKEN }}

      - name: Build Electron app on Windows 📦
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GHP_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTS_PASSWORD }}

      - name: List dist directory contents 📂
        if: matrix.os == 'macos-latest'
        run: ls -la dist

      - name: List dist directory contents 📂
        if: matrix.os == 'windows-latest'
        run: dir dist

      - name: Upload artifacts 🚚
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-artifacts # Distinguish artifacts by OS
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.yml
          if-no-files-found: ignore # Don't fail if no files are found

  # Release job: Attach built artifacts to GitHub release
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts 🚚
        uses: actions/download-artifact@v8
        with:
          path: artifacts # Download all artifacts to artifacts directory

      - name: Get Tag Message 📝
        id: tag_message
        run: |
          echo "Fetching tag message from GitHub API..."

          # Get tag ref object (works for both annotated and lightweight tags)
          TAG_REF=$(curl -s \
            -H "Authorization: token ${{ secrets.GHP_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }}")

          OBJECT_TYPE=$(echo "$TAG_REF" | jq -r '.object.type')
          OBJECT_SHA=$(echo "$TAG_REF" | jq -r '.object.sha')

          TAG_MESSAGE=""

          # Only annotated tags have a separate tag object with a message
          if [ "$OBJECT_TYPE" = "tag" ]; then
            TAG_MESSAGE=$(curl -s \
              -H "Authorization: token ${{ secrets.GHP_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/git/tags/$OBJECT_SHA" | \
              jq -r '.message')
          fi

          if [ -z "$TAG_MESSAGE" ] || [ "$TAG_MESSAGE" = "null" ]; then
            echo "⚠️ No tag message found, using default release notes"
            TAG_MESSAGE="Release ${{ github.ref_name }}"
          fi

          echo "$TAG_MESSAGE" > release_notes.md
          echo "✅ Saved tag message to release_notes.md"

      - name: Create Release in Releases Repo 🚀
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GHP_TOKEN }}
          repository: opspresso/toast
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: | # List of files to attach to the release
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/latest-*.yml
            artifacts/**/latest.yml

      - name: Create Release in This Repo 🚀
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GHP_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: | # List of files to attach to the release
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/latest-*.yml
            artifacts/**/latest.yml

      - name: Calculate DMG SHA256 🔐
        id: sha256
        run: |
          # 아티팩트 디렉토리에서 DMG 파일 찾기
          DMG_FILE=$(find ./artifacts -name "*.dmg" | head -n 1)

          if [ -z "$DMG_FILE" ]; then
            echo "⚠️ DMG 파일을 찾을 수 없습니다."
            exit 1
          fi

          echo "📦 찾은 DMG 파일: $DMG_FILE"

          # DMG 파일의 SHA256 해시 계산
          DMG_SHA256=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')
          echo "🔑 DMG SHA256: $DMG_SHA256"

          # 출력으로 SHA256 값 설정
          echo "sha256=$DMG_SHA256" >> $GITHUB_OUTPUT

      - name: Trigger for Homebrew 🚀
        run: |
          echo "🚀 Triggering Homebrew tap update..."

          # 변수 설정
          GITOPS_REPO="opspresso/homebrew-tap"
          PROJECT="toast"
          VERSION="${{ github.ref_name }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          echo "📋 Parameters:"
          echo "  Project: $PROJECT"
          echo "  Version: $VERSION"
          echo "  SHA256: $SHA256"

          # repository_dispatch 이벤트 트리거를 위한 JSON 페이로드 생성
          PAYLOAD=$(cat <<EOF
          {
            "event_type": "gitops",
            "client_payload": {
              "project": "$PROJECT",
              "version": "$VERSION",
              "sha256": "$SHA256"
            }
          }
          EOF
          )

          # GitHub API를 통해 repository_dispatch 이벤트 트리거
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GHP_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "https://api.github.com/repos/$GITOPS_REPO/dispatches"

          echo "✅ Homebrew tap update triggered"

  # Slack notification job: Send success notification
  slack-success:
    needs: [build, release]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack success notification 🎉
        uses: slackapi/slack-github-action@v3
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Toast App Build & Release Success",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Release created successfully!*\n• macOS and Windows builds completed\n• Artifacts uploaded to GitHub Release\n• Homebrew tap updated"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Release"
                      },
                      "url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Slack notification job: Send failure notification
  slack-failure:
    needs: [build, release]
    if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack failure notification ❌
        uses: slackapi/slack-github-action@v3
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Toast App Build & Release Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *Build or release process failed!*\nPlease check the workflow logs for details."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "style": "danger",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
