# Test Workflow: Runs lint and unit tests on every push and pull request to main
name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 🛎️
        uses: actions/checkout@v6

      - name: Setup Node.js 🐍
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Lint ✨
        run: npm run lint

      - name: Test 🧪
        run: npm test
